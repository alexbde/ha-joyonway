name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
category-template: '### $TITLE'
change-template: '* $TITLE ([#$NUMBER]($URL))'
sort-direction: ascending
template: |
  ## What's Changed (Since $PREVIOUS_TAG)

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  **Full Changelog**: [$PREVIOUS_TAG...$RESOLVED_VERSION](https://github.com/alexbde/ha-joyonway/compare/$PREVIOUS_TAG...$RESOLVED_VERSION)
exclude-contributors:
  - dependabot[bot]
categories:
  - type: 'version-resolver'
    semver-increment: 'major'
    when:
      label: 'breaking'
  - title: '🚀 Features'
    semver-increment: 'minor'
    when:
      labels:
        - 'feature'
        - 'enhancement'
  - title: '🐛 Bug Fixes'
    when:
      labels:
        - 'bug'
        - 'fix'
  - title: '🧰 Maintenance & Refactoring'
    when:
      labels:
        - 'chore'
        - 'dependencies'
        - 'refactor'
        - 'style'
        - 'test'
  - title: '📖 Documentation'
    when:
      labels:
        - 'documentation'
        - 'docs'
autolabeler:
  - label: 'breaking'
    title:
      - '/^feat(\(.+\))?!:/i'
      - '/^fix(\(.+\))?!:/i'
      - '/^chore(\(.+\))?!:/i'
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
      - '/^style(\(.+\))?:/i'
      - '/^test(\(.+\))?:/i'
      - '/^perf(\(.+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/i'
