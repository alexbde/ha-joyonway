name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
category-template: '### $TITLE'
change-template: '* $TITLE ([#$NUMBER]($URL))'
sort-direction: ascending
template: |
  ## What's Changed (Since $PREVIOUS_TAG)

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  **Full Changelog**: [$PREVIOUS_TAG...$RESOLVED_VERSION](https://github.com/alexbde/ha-joyonway/compare/$PREVIOUS_TAG...$RESOLVED_VERSION)
exclude-contributors:
  - dependabot[bot]
autolabeler:
  - label: 'breaking'
    title:
      - '/^feat(\(.+\))?!:/i'
      - '/^fix(\(.+\))?!:/i'
      - '/^chore(\(.+\))?!:/i'
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
      - '/^style(\(.+\))?:/i'
      - '/^test(\(.+\))?:/i'
      - '/^perf(\(.+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/i'
categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking'
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🧰 Maintenance & Refactoring'
    labels:
      - 'chore'
      - 'dependencies'
      - 'refactor'
      - 'style'
      - 'test'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
