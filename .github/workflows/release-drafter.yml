name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: Release')"
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
