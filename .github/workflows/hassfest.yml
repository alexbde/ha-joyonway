# 2026-05-16 | GitHub Actions | Validate integration with Home Assistant hassfest
# Runs on: push, pull request, daily schedule, manual dispatch
# Source: https://developers.home-assistant.io/blog/2020/04/16/hassfest-as-a-github-action/
name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
